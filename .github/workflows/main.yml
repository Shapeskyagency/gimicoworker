# .github/workflows/deploy-pages.yml
name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build static site
        run: npm run build --workspace docs-site # or your own build command

      - name: Deploy
        uses: actions/deploy-pages@v4
        with:
          path: docs-site/dist           # adjust if different
